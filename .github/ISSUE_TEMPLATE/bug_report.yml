name: Bug report
description: Report a bug or unexpected behavior in the theme
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include screenshots if helpful.
    validations:
      required: true
  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: e.g. 6.7
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / environment
      placeholder: e.g. Chrome 130, Safari 18
    validations:
      required: false
