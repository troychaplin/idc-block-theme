name: Feature request
description: Suggest a new feature or enhancement for the theme
title: "[Feature]: "
labels: ["feature", "triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature you'd like to see.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: What problem does this feature address? Who benefits?
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this feature work? Include any implementation ideas.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.
    validations:
      required: false
